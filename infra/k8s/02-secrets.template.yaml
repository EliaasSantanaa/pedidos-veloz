# ATENCAO: Professor este arquivo e apenas um template.
# CRIEI ELE PRA QUE VOCÊ POSSA TROCAR AS VARIAVES DEPOIS.
# AS VARIAVEIS DEVE SER SUBSTITUIDAS POR VALORES REAIS, CODIFICADOS EM BASE64.

apiVersion: v1
kind: Secret
metadata:
  name: orders-secrets
  namespace: pedidos-veloz
type: Opaque
data:
  DATABASE_URL: <base64_postgresql_connection_string>
---
apiVersion: v1
kind: Secret
metadata:
  name: payments-secrets
  namespace: pedidos-veloz
type: Opaque
data:
  PAYMENT_GATEWAY_URL: <base64_payment_gateway_url>
  PAYMENT_GATEWAY_KEY: <base64_payment_gateway_api_key>
---
apiVersion: v1
kind: Secret
metadata:
  name: inventory-secrets
  namespace: pedidos-veloz
type: Opaque
data:
  DATABASE_URL: <base64_postgresql_connection_string>
