# Bloqueia todo trafego por padrao
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: pedidos-veloz
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Permite trafego externo apenas no api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
  namespace: pedidos-veloz
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - {}

---
# Permite comunicacao interna entre os servicos
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-services
  namespace: pedidos-veloz
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pedidos-veloz
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pedidos-veloz
    - to: {}
      ports:
        - port: 443
          protocol: TCP
