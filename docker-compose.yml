networks:
  pedidos-net:
    driver: bridge

volumes:
  pg_data:
  rabbitmq_data:

services:
  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8080:80"
    depends_on:
      - orders-service
      - payments-service
      - inventory-service
    networks:
      - pedidos-net
    restart: unless-stopped

  orders-service:
    build:
      context: ./services/orders-service
    environment:
      - NODE_ENV=development
      - PORT=3001
    networks:
      - pedidos-net
    restart: unless-stopped

  payments-service:
    build:
      context: ./services/payments-service
    environment:
      - NODE_ENV=development
      - PORT=3002
    networks:
      - pedidos-net
    restart: unless-stopped

  inventory-service:
    build:
      context: ./services/inventory-service
    environment:
      - NODE_ENV=development
      - PORT=3003
    networks:
      - pedidos-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orders_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedidos-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pedidos-net
