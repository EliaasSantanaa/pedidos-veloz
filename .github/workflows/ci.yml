name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint e Testes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [orders-service, payments-service, inventory-service]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Lint
        run: npm run lint
        working-directory: services/${{ matrix.service }}

      - name: Testes unitarios
        run: npm test
        working-directory: services/${{ matrix.service }}

  build-check:
    name: Validar build Docker
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          [api-gateway, orders-service, payments-service, inventory-service]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem
        run: |
          docker build \
            --target production \
            --tag ${{ matrix.service }}:pr-${{ github.sha }} \
            ./services/${{ matrix.service }}

  security-scan:
    name: Scan de vulnerabilidades
    runs-on: ubuntu-latest
    needs: build-check
    strategy:
      matrix:
        service: [orders-service, payments-service, inventory-service]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build para scan
        run: |
          docker build \
            --target production \
            -t ${{ matrix.service }}:scan \
            ./services/${{ matrix.service }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.service }}:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
